<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幾何圖形是非題挑戰</title>
    <style>
        :root { --primary: #4a90e2; --success: #28a745; --danger: #dc3545; }
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; width: 90%; max-width: 500px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .progress { font-size: 14px; color: #888; margin-bottom: 10px; }
        #question-text { font-size: 24px; font-weight: bold; margin: 30px 0; min-height: 80px; color: #333; line-height: 1.5; display: flex; align-items: center; justify-content: center; }
        .btn-group { display: flex; gap: 20px; justify-content: center; }
        .btn-choice { width: 100px; height: 100px; font-size: 40px; border: none; border-radius: 50%; cursor: pointer; transition: transform 0.1s, background 0.2s; color: white; display: flex; align-items: center; justify-content: center; }
        .btn-choice:active { transform: scale(0.9); }
        .btn-o { background-color: var(--success); }
        .btn-x { background-color: var(--danger); }
        #stats { display: flex; justify-content: space-around; margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; }
        .stat-item { display: flex; flex-direction: column; }
        .stat-num { font-size: 20px; font-weight: bold; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .big-btn { padding: 15px 40px; font-size: 20px; background: var(--primary); color: white; border: none; border-radius: 30px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <div class="progress">第 <span id="current-idx">1</span> / 10 題</div>
    <div id="question-text">載入中...</div>
    
    <div class="btn-group">
        <button class="btn-choice btn-o" onclick="handleAnswer(true)">O</button>
        <button class="btn-choice btn-x" onclick="handleAnswer(false)">X</button>
    </div>

    <div id="stats">
        <div class="stat-item"><span>答對</span><span id="correct-count" class="stat-num" style="color:var(--success)">0</span></div>
        <div class="stat-item"><span>答錯</span><span id="wrong-count" class="stat-num" style="color:var(--danger)">0</span></div>
    </div>
</div>

<div id="result-overlay" class="overlay">
    <h1 id="result-title">測驗結束</h1>
    <div id="result-summary" style="font-size: 24px; margin: 20px 0; line-height: 1.6;"></div>
    <button class="big-btn" onclick="initGame()">再玩一次</button>
</div>

<script>
    const fullBank = [
        "O正方形四條邊都一樣長", "O正方形兩雙對邊分別等長", "O正方形四個角都是直角", "O正方形兩雙對角分別相等", "O正方形兩雙對邊互相平行", "X正方形只有一雙對邊互相平行",
        "X長方形四條邊都一樣長", "O長方形兩雙對邊分別等長", "O長方形四個角都是直角", "O長方形兩雙對角分別相等", "O長方形兩雙對邊互相平行", "X長方形只有一雙對邊互相平行",
        "X平行四邊形四條邊都一樣長", "O平行四邊形兩雙對邊分別等長", "X平行四邊形四個角都是直角", "O平行四邊形兩雙對角分別相等", "O平行四邊形兩雙對邊互相平行", "X平行四邊形只有一雙對邊互相平行",
        "O菱形四條邊都一樣長", "O菱形兩雙對邊分別等長", "X菱形四個角都是直角", "O菱形兩雙對角分別相等", "O菱形兩雙對邊互相平行", "X菱形只有一雙對邊互相平行",
        "X梯形四條邊都一樣長", "X梯形兩雙對邊分別等長", "X梯形四個角都是直角", "X梯形兩雙對角分別相等", "X梯形兩雙對邊互相平行", "O梯形只有一雙對邊互相平行",
        "O正方形是一種長方形", "O正方形是一種平行四邊形", "O正方形是一種菱形", "X正方形是一種梯形", "X長方形是一種正方形", "O長方形是一種平行四邊形",
        "X長方形是一種菱形", "X長方形是一種梯形", "X平行四邊形是一種正方形", "X平行四邊形是一種長方形", "X平行四邊形是一種菱形", "X平行四邊形是一種梯形",
        "X菱形是一種正方形", "X菱形是一種長方形", "O菱形是一種平行四邊形", "X菱形是一種梯形", "X梯形是一種正方形", "X梯形是一種長方形",
        "X梯形是一種平行四邊形", "X梯形是一種菱形"
    ];

    let currentQuestions = [];
    let currentIndex = 0;
    let correct = 0;
    let wrong = 0;

    function initGame() {
        currentQuestions = [...fullBank].sort(() => Math.random() - 0.5).slice(0, 10);
        currentIndex = 0;
        correct = 0;
        wrong = 0;
        document.getElementById('result-overlay').style.display = 'none';
        updateUI();
    }

    function updateUI() {
        const qData = currentQuestions[currentIndex];
        document.getElementById('question-text').innerText = qData.substring(1);
        document.getElementById('current-idx').innerText = currentIndex + 1;
        document.getElementById('correct-count').innerText = correct;
        document.getElementById('wrong-count').innerText = wrong;
    }

    function handleAnswer(userSelectTrue) {
        const qData = currentQuestions[currentIndex];
        const isTrue = qData.startsWith('O');
        
        if (userSelectTrue === isTrue) {
            // 答對：增加分數，不跳彈窗
            correct++;
            proceed();
        } else {
            // 答錯：增加錯誤數，跳出提示
            wrong++;
            alert(`答錯囉！ ❌\n題目：${qData.substring(1)}\n正確答案是：【${isTrue ? 'O' : 'X'}】`);
            proceed();
        }
    }

    function proceed() {
        currentIndex++;
        if (currentIndex < 10) {
            updateUI();
        } else {
            showFinalResult();
        }
    }

    function showFinalResult() {
        const overlay = document.getElementById('result-overlay');
        const summary = document.getElementById('result-summary');
        overlay.style.display = 'flex';
        const score = Math.round((correct / 10) * 100);
        summary.innerHTML = `本次測驗完畢！<br>得分：<b>${score}</b> 分<br>答對：${correct} 題<br>答錯：${wrong} 題`;
    }

    initGame();
</script>

</body>
</html>
