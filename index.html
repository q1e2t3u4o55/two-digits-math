<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數學限時挑戰賽</title>
    <style>
        :root { --primary: #6c5ce7; --success: #28a745; --danger: #dc3545; }
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; width: 90%; max-width: 400px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; position: relative; }
        
        #timer-bar { font-size: 20px; font-weight: bold; color: var(--danger); margin-bottom: 10px; background: #ffeaa7; padding: 5px; border-radius: 10px; }
        .progress { font-size: 14px; color: #666; margin-bottom: 10px; }
        
        #question-display { font-size: 56px; font-weight: bold; margin: 20px 0; color: #2d3436; height: 80px; display: flex; align-items: center; justify-content: center; }
        #user-input { font-size: 36px; background: #f8f9fa; height: 60px; line-height: 60px; border-radius: 12px; margin-bottom: 20px; border: 2px solid #dfe6e9; color: var(--primary); font-weight: bold; }
        
        .keyboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        button { padding: 15px; font-size: 24px; border: none; border-radius: 12px; cursor: pointer; background: #ecf0f1; transition: 0.2s; color: #2d3436; }
        button:active { background: #dcdde1; transform: scale(0.95); }
        .btn-confirm { background: var(--success); color: white; }
        .btn-clear { background: var(--danger); color: white; }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.98); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; border-radius: 20px; }
        .big-btn { padding: 15px 40px; font-size: 22px; background: var(--primary); color: white; border: none; border-radius: 50px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <div id="game-overlay" class="overlay">
        <h1 id="overlay-title">數學限時挑戰</h1>
        <p id="overlay-desc">一分鐘內，看你能答對幾題！</p>
        <div id="final-result" style="display:none; font-size: 24px; margin: 20px 0; line-height: 1.6;"></div>
        <button class="big-btn" onclick="startGame()">開始挑戰</button>
    </div>

    <div id="timer-bar">剩餘時間：<span id="time-left">60</span> 秒</div>
    <div class="progress">目前已答對：<span id="correct-count">0</span> 題</div>
    
    <div id="question-display">? + ?</div>
    <div id="user-input"></div>

    <div class="keyboard">
        <button onclick="pressNum(1)">1</button>
        <button onclick="pressNum(2)">2</button>
        <button onclick="pressNum(3)">3</button>
        <button onclick="pressNum(4)">4</button>
        <button onclick="pressNum(5)">5</button>
        <button onclick="pressNum(6)">6</button>
        <button onclick="pressNum(7)">7</button>
        <button onclick="pressNum(8)">8</button>
        <button onclick="pressNum(9)">9</button>
        <button class="btn-clear" onclick="clearInput()">C</button>
        <button onclick="pressNum(0)">0</button>
        <button class="btn-confirm" onclick="checkAnswer()">✔</button>
    </div>
</div>

<script>
    let correct = 0;
    let wrong = 0;
    let timeLeft = 60;
    let timerInterval = null;
    let correctAnswer = 0;
    let inputStr = "";

    function startGame() {
        // 重設數據
        correct = 0;
        wrong = 0;
        timeLeft = 60;
        inputStr = "";
        
        // 隱藏覆蓋層
        document.getElementById('game-overlay').style.display = 'none';
        document.getElementById('correct-count').innerText = correct;
        document.getElementById('time-left').innerText = timeLeft;
        
        // 開始出題與計時
        generateQuestion();
        startTimer();
    }

    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('time-left').innerText = timeLeft;
            if (timeLeft <= 0) {
                endGame();
            }
        }, 1000);
    }

    function generateQuestion() {
        inputStr = "";
        updateDisplay();

        const mode = Math.floor(Math.random() * 2);

        if (mode === 0) {
            // 模式 0: 兩位數 (10-90) 與 一位數 (1-9) 加減
            const isPlus = Math.random() > 0.5;
            const numA = Math.floor(Math.random() * 81) + 10;
            const numB = Math.floor(Math.random() * 9) + 1;
            
            if (isPlus) {
                correctAnswer = numA + numB;
                document.getElementById('question-display').innerText = `${numA} + ${numB}`;
            } else {
                correctAnswer = numA - numB;
                document.getElementById('question-display').innerText = `${numA} - ${numB}`;
            }
        } else {
            // 模式 1: 一位數 + 一位數 = 兩位數
            let a = Math.floor(Math.random() * 9) + 1;
            let b = Math.floor(Math.random() * 9) + 1;
            while (a + b < 10) { 
                a = Math.floor(Math.random() * 9) + 1;
                b = Math.floor(Math.random() * 9) + 1;
            }
            correctAnswer = a + b;
            document.getElementById('question-display').innerText = `${a} + ${b}`;
        }
    }

    function pressNum(n) {
        if (inputStr.length < 3) {
            inputStr += n;
            updateDisplay();
        }
    }

    function clearInput() {
        inputStr = "";
        updateDisplay();
    }

    function updateDisplay() {
        document.getElementById('user-input').innerText = inputStr;
    }

    function checkAnswer() {
        if (inputStr === "" || timeLeft <= 0) return;

        if (parseInt(inputStr) === correctAnswer) {
            correct++;
            document.getElementById('correct-count').innerText = correct;
            generateQuestion();
        } else {
            wrong++;
            alert(`答錯了！正確答案是：${correctAnswer}`);
            generateQuestion();
        }
    }

    function endGame() {
        clearInterval(timerInterval);
        const overlay = document.getElementById('game-overlay');
        const title = document.getElementById('overlay-title');
        const desc = document.getElementById('overlay-desc');
        const result = document.getElementById('final-result');
        
        overlay.style.display = 'flex';
        title.innerText = "時間到！";
        desc.style.display = 'none';
        result.style.display = 'block';
        result.innerHTML = `你在一分鐘內答對了：<br><span style="font-size:48px; color:var(--success);">${correct}</span> 題`;
    }
</script>

</body>
</html>
